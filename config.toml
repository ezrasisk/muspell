# muspell/config.toml — Reference configuration
# All values shown are the compile-time defaults.
# Override any field with a MUSPELL__<SECTION>__<KEY> environment variable.
# Example: MUSPELL__KNS__TIMEOUT_MS=10000

# ─────────────────────────────────────────────────────────────────────────────
# [node] — Local Iroh node identity and networking
# ─────────────────────────────────────────────────────────────────────────────
[node]

# Path to the Ed25519 secret key file (PEM/OpenSSH format).
# If absent, a new key is generated and written here on first start.
key_path = "~/.local/share/muspell/node.key"   # Linux XDG default

# KNS names this node claims to own.
# On startup, Muspell resolves each name and validates the ownership proof
# against the local key. Mismatches abort startup with a clear error.
owned_names = [
    # "mynode.kas",
]

# Optional QUIC relay server URLs for NAT hole-punching.
# Leave empty to use Iroh's built-in default relays.
relay_urls = []

# UDP address for the Iroh QUIC listener.
bind_addr = "0.0.0.0:11204"


# ─────────────────────────────────────────────────────────────────────────────
# [kns] — Kaspa Name Service RPC client
# ─────────────────────────────────────────────────────────────────────────────
[kns]

# Primary KNS REST API endpoint.
rpc_url = "https://api.kasplex.org/v1/kns"

# Ordered list of failover endpoints tried when the primary is unreachable.
fallback_urls = [
    # "https://kns-backup.example.com/v1/kns",
]

# Per-request timeout in milliseconds.
timeout_ms = 5000

# Maximum total retry attempts across all configured URLs before giving up.
max_retries = 5

# Initial backoff delay (ms); doubles on each attempt up to max_backoff_ms.
initial_backoff_ms = 200

# Hard ceiling on retry delay.
max_backoff_ms = 30000

# Successful resolution cache TTL (seconds). Controls both the in-memory cache
# expiry and the KNS refresh loop interval in the daemon.
cache_ttl_s = 300


# ─────────────────────────────────────────────────────────────────────────────
# [mirror] — EigenMead data-mirroring engine
# ─────────────────────────────────────────────────────────────────────────────
[mirror]

# Minimum number of live peers that must ACK a blob for it to be considered
# durably mirrored. Writes block until this threshold is met or an error is
# returned.
quorum = 3

# How often (seconds) the engine verifies all tracked blobs and re-pushes any
# that have fallen below quorum.
sync_interval_s = 60

# Maximum number of parallel in-flight blob transfer operations.
max_concurrent_syncs = 8

# Blobs larger than this value (bytes) are skipped by the auto-mirror loop.
# Use `muspell mirror add <hash>` to force-mirror oversized blobs.
max_blob_bytes = 536870912   # 512 MiB

# Local filesystem path for the blob store.
blob_store_path = "~/.local/share/muspell/blobs"


# ─────────────────────────────────────────────────────────────────────────────
# [observability] — Tracing and health endpoint
# ─────────────────────────────────────────────────────────────────────────────
[observability]

# tracing-subscriber filter directive.
# See: https://docs.rs/tracing-subscriber/latest/tracing_subscriber/filter/struct.EnvFilter.html
log_level = "info"

# Log output format: "pretty" | "json" | "compact"
# Use "json" in production for log aggregators (Loki, Datadog, etc.).
log_format = "pretty"

# Bind address for the Axum HTTP health / metrics endpoint.
# GET /health  → full JSON status
# GET /readyz  → 200 OK when ≥1 peer is live, 503 otherwise
health_addr = "127.0.0.1:9090"
